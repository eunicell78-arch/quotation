<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단가 조회 시스템</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f5f7; min-height: 100vh; }
  input, select, button { font-family: inherit; }
  input[type="search"]::-webkit-search-cancel-button { -webkit-appearance: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .card-anim { animation: fadeIn 0.18s ease both; }
</style>
</head>
<body>

<div id="app" style="min-height:100vh; max-width:640px; margin:0 auto; background:#fff; box-shadow:0 0 40px rgba(0,0,0,0.08);"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const $ = id => document.getElementById(id);
let allData = [], headers = [], colMap = {};
let searchTimer;

const NAV_BG = '#0f2645';
const ACCENT = '#1a6fd4';

// ★ GitHub 정보 (본인 저장소에 맞게 되어 있습니다)
const GITHUB_USER = 'eunicell78-arch';
const GITHUB_REPO = 'costbook';
const EXCEL_FILE  = 'pricelist.xlsx';

const EXCEL_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${EXCEL_FILE}`;

function iconSearch(color='currentColor', size=18) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
}

function render(html) { $('app').innerHTML = html; }

function navBar(subtitle, extraBtn='') {
  return `<div style="background:${NAV_BG};color:white;padding:16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;background:rgba(255,255,255,0.12);border-radius:10px;display:flex;align-items:center;justify-content:center">${iconSearch('white')}</div>
      <div>
        <div style="font-weight:500;font-size:16px;letter-spacing:-0.3px">단가 조회 시스템</div>
        <div style="font-size:11px;opacity:0.6;margin-top:1px">${subtitle}</div>
      </div>
    </div>${extraBtn}</div>`;
}

async function init() {
  render(`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:14px;">
    <div style="width:40px;height:40px;border:3px solid ${ACCENT};border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></div>
    <div style="color:#666;font-size:14px;text-align:center;">단가표 불러오는 중...<br><span style="font-size:12px;color:#999;">${EXCEL_FILE}</span></div>
  </div>`);

  try {
    const res = await fetch(EXCEL_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`파일을 찾을 수 없습니다 (HTTP ${res.status})\n저장소에 <b>${EXCEL_FILE}</b> 파일이 있는지 확인하세요.`);
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array', cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, {defval:''});
    if (!json.length) throw new Error('엑셀 파일에 데이터가 없습니다.');
    headers = Object.keys(json[0]);
    allData = json;
    detectCols();
    showSearch();
  } catch(err) {
    showError(err.message);
  }
}

function showError(msg) {
  render(`<div>
    ${navBar('불러오기 실패')}
    <div style="padding:24px 16px;">
      <div style="background:#fff;border-radius:14px;border:1px solid #fca5a5;padding:28px 20px;text-align:center;">
        <div style="font-size:36px;margin-bottom:12px;">⚠️</div>
        <div style="font-weight:600;font-size:16px;color:#111;margin-bottom:12px;">단가표를 불러올 수 없습니다</div>
        <div style="font-size:13px;color:#b91c1c;line-height:1.7;margin-bottom:16px;background:#fef2f2;padding:12px;border-radius:8px;text-align:left;">${msg}</div>
        <div style="font-size:13px;color:#444;line-height:1.9;text-align:left;background:#f9fafb;padding:14px;border-radius:8px;margin-bottom:16px;">
          <b>확인 사항</b><br>
          1. 저장소에 <code style="background:#e5e7eb;padding:1px 6px;border-radius:4px;">${EXCEL_FILE}</code> 이 업로드됐는지<br>
          2. 저장소가 <b>Public</b>으로 설정됐는지<br>
          3. GitHub Pages가 활성화됐는지
        </div>
        <button onclick="init()" style="background:${ACCENT};color:white;border:none;padding:13px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;width:100%;">
          다시 시도
        </button>
      </div>
    </div>
  </div>`);
}

function detectCols() {
  colMap = {};
  headers.forEach(h => {
    const l = h.toLowerCase().replace(/[^a-z0-9가-힣]/g,'');
    if (!colMap.part     && (l.includes('part') || l.includes('부품'))) colMap.part = h;
    if (!colMap.desc     && (l.includes('desc') || l.includes('설명'))) colMap.desc = h;
    if (!colMap.current  && (l.includes('ratedcurrent') || l.includes('current') || l.includes('전류'))) colMap.current = h;
    if (!colMap.length   && (l.includes('cablelength') || l.includes('length') || l.includes('길이'))) colMap.length = h;
    if (!colMap.moq      && l.includes('moq')) colMap.moq = h;
    if (!colMap.price    && (l.includes('dmst') || l.includes('price') || l.includes('단가') || l.includes('cost') || l.includes('amt'))) colMap.price = h;
    if (!colMap.vendor   && (l.includes('vdr') || l.includes('vendor') || l.includes('공급') || l.includes('supplier'))) colMap.vendor = h;
    if (!colMap.delivery && (l.includes('delivery') || l.includes('납기'))) colMap.delivery = h;
    if (!colMap.quotedate && (l.includes('quotedate') || l.includes('quotedat') || l.includes('quote') || l.includes('견적일'))) colMap.quotedate = h;
  });
}

function showSearch() {
  const hasFilters = !!(colMap.current || colMap.length);
  const refreshBtn = `<button onclick="init()" style="background:rgba(255,255,255,0.12);color:white;border:1px solid rgba(255,255,255,0.25);border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer;">새로고침</button>`;

  render(`
  <div>
    ${navBar(allData.length.toLocaleString() + '개 품목', refreshBtn)}
    <div style="background:#fff;padding:12px 14px 10px;border-bottom:1px solid #e5e7eb;position:sticky;top:68px;z-index:9;">
      <div style="position:relative;margin-bottom:${hasFilters ? '10px' : '0'}">
        <div style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;">${iconSearch('#999', 16)}</div>
        <input type="search" id="q" placeholder="PART#, 품목명, 공급업체 검색..." autocomplete="off"
          style="width:100%;padding:13px 36px 13px 38px;border-radius:10px;border:1px solid #d1d5db;font-size:16px;background:#f9fafb;color:#111;outline:none;"
          oninput="schedSearch()">
        <button id="clearBtn" onclick="clearSearch()" style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:#999;font-size:16px;">✕</button>
      </div>
      ${hasFilters ? `<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;">
        ${colMap.current ? `<select id="fCur" onchange="doSearch()" style="flex-shrink:0;padding:7px 10px;border-radius:20px;border:1px solid #d1d5db;font-size:13px;background:#f9fafb;color:#333;">
          <option value="">⚡ Rated Current</option>
        </select>` : ''}
        ${colMap.length ? `<select id="fLen" onchange="doSearch()" style="flex-shrink:0;padding:7px 10px;border-radius:20px;border:1px solid #d1d5db;font-size:13px;background:#f9fafb;color:#333;">
          <option value="">📏 Cable Length</option>
        </select>` : ''}
      </div>` : ''}
    </div>
    <div id="res" style="padding:12px 14px 40px;">
      <div style="text-align:center;padding:48px 0;color:#aaa;">
        <div style="margin-bottom:10px;opacity:0.4">${iconSearch('#aaa', 36)}</div>
        <div style="font-size:14px;color:#888;">검색어를 입력하세요</div>
        <div style="font-size:12px;margin-top:4px;opacity:0.7;">부품번호 또는 품목명으로 검색</div>
      </div>
    </div>
  </div>`);
  setTimeout(() => { const q = $('q'); if(q) q.focus(); }, 100);
}

function clearSearch() {
  $('q').value = '';
  $('clearBtn').style.display = 'none';
  const curEl = $('fCur'), lenEl = $('fLen');
  if (curEl) curEl.innerHTML = '<option value="">⚡ Rated Current</option>';
  if (lenEl) lenEl.innerHTML = '<option value="">📏 Cable Length</option>';
  $('res').innerHTML = `<div style="text-align:center;padding:48px 0;color:#aaa;"><div style="font-size:14px;color:#888;">검색어를 입력하세요</div></div>`;
}

function schedSearch() {
  const btn = $('clearBtn');
  if (btn) btn.style.display = $('q').value ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 180);
}

function doSearch() {
  const q = ($('q')?.value || '').trim().toLowerCase();
  const fCur = $('fCur')?.value || '';
  const fLen = $('fLen')?.value || '';
  if (!q && !fCur && !fLen) return;

  const tokens = q.split(/\s+/).filter(Boolean);

  const textFiltered = allData.filter(row => {
    if (!tokens.length) return true;
    const searchable = [colMap.part, colMap.desc, colMap.vendor, colMap.quotedate, 'PART#','Description','VDR','Sort']
      .filter(Boolean).map(k => String(row[k]||'').toLowerCase()).join(' ');
    return tokens.every(t => searchable.includes(t) || Object.values(row).some(v => String(v).toLowerCase().includes(t)));
  });

  const curEl = $('fCur'), lenEl = $('fLen');
  const sortVals = arr => arr.sort((a,b) => { const na=parseFloat(a),nb=parseFloat(b); return (!isNaN(na)&&!isNaN(nb))?na-nb:a.localeCompare(b); });
  if (curEl && colMap.current) {
    const vals = sortVals([...new Set(textFiltered.map(r => String(r[colMap.current]||'')).filter(v => v && v !== 'undefined'))]);
    const prev = curEl.value;
    curEl.innerHTML = `<option value="">⚡ Rated Current 전체</option>${vals.map(v=>`<option value="${v}"${v===prev?' selected':''}>${v}</option>`).join('')}`;
    if (prev && !vals.includes(prev)) curEl.value = '';
  }
  if (lenEl && colMap.length) {
    const vals = sortVals([...new Set(textFiltered.map(r => String(r[colMap.length]||'')).filter(v => v && v !== 'undefined'))]);
    const prev = lenEl.value;
    lenEl.innerHTML = `<option value="">📏 Cable Length 전체</option>${vals.map(v=>`<option value="${v}"${v===prev?' selected':''}>${v}</option>`).join('')}`;
    if (prev && !vals.includes(prev)) lenEl.value = '';
  }

  const curFinal = curEl?.value || '';
  const lenFinal = lenEl?.value || '';
  const results = textFiltered.filter(row => {
    if (curFinal && String(row[colMap.current]||'') !== curFinal) return false;
    if (lenFinal && String(row[colMap.length]||'') !== lenFinal) return false;
    return true;
  });

  const resEl = $('res'); if (!resEl) return;
  if (!results.length) {
    resEl.innerHTML = `<div style="text-align:center;padding:48px 0;color:#aaa;font-size:14px;">검색 결과가 없습니다<br><span style="font-size:12px;">다른 검색어를 시도해보세요</span></div>`;
    return;
  }
  const show = results.slice(0, 60);
  resEl.innerHTML = `
    <div style="font-size:12px;color:#888;margin-bottom:10px;font-weight:500;">${results.length.toLocaleString()}개 결과${results.length > 60 ? ' · 상위 60개 표시' : ''}</div>
    ${show.map((r,i) => card(r,i)).join('')}`;
}

function fmtPrice(v) {
  const n = parseFloat(String(v).replace(/[,$]/g,''));
  if (isNaN(n) || n === 0) return null;
  return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fmtDate(v) {
  if (!v) return '';
  const s = String(v);
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
  const slash = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (slash) {
    const y = slash[3].length === 2 ? '20' + slash[3] : slash[3];
    return `${y}-${slash[1].padStart(2,'0')}-${slash[2].padStart(2,'0')}`;
  }
  return s.length > 10 ? s.slice(0,10) : s;
}

function tag(label, val, bg, tc) {
  if (!val && val !== 0) return '';
  return `<span style="background:${bg};color:${tc};padding:3px 8px;border-radius:10px;font-size:12px;white-space:nowrap;">${label ? label+': ' : ''}${val}</span>`;
}

function card(row, idx) {
  const part      = colMap.part      ? row[colMap.part]      : '';
  const vendor    = colMap.vendor    ? row[colMap.vendor]    : '';
  const price     = colMap.price     ? fmtPrice(row[colMap.price]) : null;
  const moq       = colMap.moq       ? row[colMap.moq]       : '';
  const cur       = colMap.current   ? row[colMap.current]   : '';
  const len       = colMap.length    ? row[colMap.length]    : '';
  const del       = colMap.delivery  ? row[colMap.delivery]  : '';
  const quotedate = colMap.quotedate ? fmtDate(row[colMap.quotedate]) : '';
  const hasTags   = cur || len || (moq !== '' && moq !== 0) || del;

  return `<div class="card-anim" style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:14px;margin-bottom:9px;animation-delay:${Math.min(idx*20,200)}ms;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
      <div style="flex:1;min-width:0;">
        ${part   ? `<div style="font-weight:600;font-size:15px;color:#111;word-break:break-all;line-height:1.3;">${part}</div>` : ''}
        ${vendor ? `<div style="font-size:12px;color:${ACCENT};margin-top:3px;font-weight:500;">${vendor}${quotedate ? ` · ${quotedate}` : ''}</div>` : ''}
        ${hasTags ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;">
          ${tag(colMap.current||'Current', cur, '#e8f3ff', '#0d4c8a')}
          ${tag(colMap.length||'Length',   len, '#e6f4ea', '#1a5c24')}
          ${moq !== '' && moq != 0 ? tag('MOQ', moq, '#fff8e6', '#7a4e00') : ''}
          ${del ? tag('', del, '#f5e8ff', '#5a1a8a') : ''}
        </div>` : ''}
      </div>
      <div style="text-align:right;flex-shrink:0;padding-left:4px;">
        ${price
          ? `<div style="font-size:22px;font-weight:700;color:${NAV_BG};letter-spacing:-0.5px;">${price}</div>
             ${moq !== '' && moq != 0 ? `<div style="font-size:11px;color:#999;margin-top:1px;">MOQ ${moq}</div>` : ''}`
          : `<div style="font-size:13px;color:#999;background:#f3f4f6;padding:6px 10px;border-radius:8px;">미정</div>`
        }
      </div>
    </div>
  </div>`;
}

init();
</script>
</body>
</html>
